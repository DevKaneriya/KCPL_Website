<div class="main">

    <div class="content">

        <div #revealH1 class="header">
            <ng-container *ngFor="let word of letters; let i = index">
                <span [class.grey]="i >= revealedCount" [class.black]="i < revealedCount && !word.isBlue"
                    [class.blue]="i < revealedCount && word.isBlue">
                    {{ word.word }}
                </span>
            </ng-container>
        </div>

        <div class="mobile-image">
            <img src="assets/images/Manufacture/stringent-quality.png" alt="">
        </div>

        <div class="body">
            we believe that quality is not an endpoint—it's embedded in every step of the process. From raw material
            inspection to final product validation, stringent quality protocols are followed to ensure the highest
            manufacturing standards.
        </div>
    </div>

    <div class="image">
        <img src="assets/images/Manufacture/stringent-quality.png" alt="">
    </div>

</div>
