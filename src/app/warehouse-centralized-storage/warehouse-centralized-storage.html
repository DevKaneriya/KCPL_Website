<div class="main">

    <div class="content">
        
        <div #revealH1 class="header">
                <ng-container *ngFor="let word of letters; let i = index">
                    <span [class.grey]="i >= revealedCount" [class.black]="i < revealedCount && !word.isBlue"
                        [class.blue]="i < revealedCount && word.isBlue">
                        {{ word.word }}
                    </span>
                </ng-container>
            </div>

        <div class="mobile-image">
            <img src="assets/images/Warehouse/centralized-storage.png" alt="">
        </div>

        <div class="body">
            At KCPL, our warehouse isn't just a place to store goods—it's a strategic asset in our operational
            efficiency. Serving as a centralized hub, our warehouse plays a critical role in maintaining smooth
            workflows across procurement, production, and logistics.
        </div>
    </div>

    <div class="image">
        <img src="assets/images/Warehouse/centralized-storage.png" alt="">
    </div>

</div>
