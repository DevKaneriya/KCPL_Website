<div class="main">
    <div #revealH1 class="header">
        <ng-container *ngFor="let word of letters; let i = index">
            <span [class.grey]="i >= revealedCount" [class.black]="i < revealedCount && !word.isBlue"
                [class.blue]="i < revealedCount && word.isBlue">
                {{ word.word }}
            </span>
        </ng-container>
    </div>


    <div *ngIf="!loading">


        <div class="cards">

            <div class="card" *ngFor="let blog of blogs" (click)="goToBlog(blog.slug)">

                <img referrerpolicy="no-referrer" [src]="blog.cover_image" alt="">

                <div class="padding">
                    <div class="card-head">
                        <p>{{ blog.title }}</p>
                    </div>

                    <div class="card-content">
                        <p>{{ blog.excerpt }}</p>
                    </div>

                    <div class="card-foot">
                        <a (click)="goToBlog(blog.slug)">Learn More</a>
                    </div>
                </div>

            </div>

        </div>

        <div class="view-more">
            <button routerLink="/blogs">View More</button>
        </div>

    </div>

    <!-- Optional loader -->
    <div *ngIf="loading">
        <div class="skeleton-wrapper">
            <div class="skeleton-card sl_effect"></div>
            <div class="skeleton-card sl_effect"></div>
            <div class="skeleton-card sl_effect"></div>
        </div>
    </div>

</div>
