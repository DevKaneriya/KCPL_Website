<div class="main">
  <div #revealH1 class="header">
    <ng-container *ngFor="let word of letters; let i = index">
      <span [class.grey]="i >= revealedCount" [class.black]="i < revealedCount && !word.isBlue"
        [class.blue]="i < revealedCount && word.isBlue">
        {{ word.word }}
      </span>
    </ng-container>
  </div>
  <div class="flex">
    <div class="image" [ngStyle]="{'background-image': 'url(' + currentData.image + ')'}">
      <div class="bg-color"></div>
    </div>
    <div class="content">
      <div class="head">
        <p>{{ currentData.name }}</p>
      </div>
      <div class="body">
        <p>{{ currentData.content }}</p>
      </div>
      <div class="footer">
        <button *ngFor="let cat of categories" [ngClass]="{'active': cat.name === currentCategory}"
          (click)="setCategory(cat.name)">
          {{ cat.name }}
        </button>
      </div>
    </div>
  </div>
</div>
