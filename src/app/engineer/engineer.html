<div class="content">
  <div #revealH1 class="content-header">
    <ng-container *ngFor="let word of letters; let i = index">
      <span [class.grey]="i >= revealedCount" [class.black]="i < revealedCount && !word.isBlue"
        [class.blue]="i < revealedCount && word.isBlue">
        {{ word.word }}
      </span>
    </ng-container>
  </div>
  <div class="content-body">
    <p>We are the backbone of reliable thermal management — precision-built for passenger, commercial, industrial, and high-performance vehicles. Backed by rigorous testing. Designed for maximum efficiency and lifespan. </p>
  </div>
