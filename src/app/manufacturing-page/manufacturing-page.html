<div class="main">

    <!-- Background Video -->
    <video class="bg-video" autoplay muted loop playsinline preload="auto">
        <source src="assets/images/Manufacture/manufacturing-main.mp4" type="video/mp4">
    </video>

    <!-- Overlay -->
    <div class="overlay"></div>

    <!-- Dynamic Content -->
    <div class="content">
        <h1 class="header">{{ slides[currentSlide].title }}</h1>

        <p class="sub-header">
            {{ slides[currentSlide].description }}
        </p>

        <button class="button" (click)="scrollToQualitySystems()">
            {{ slides[currentSlide].buttonText }}
        </button>
    </div>

</div>

<app-manufacturing-raw-material></app-manufacturing-raw-material>
<app-manufacturing-quality-systems id="manufacturing-quality-systems"></app-manufacturing-quality-systems>
<app-technical-capabilities></app-technical-capabilities>
<app-reach-out></app-reach-out>
<app-footer></app-footer>
