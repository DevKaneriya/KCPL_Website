<div class="main">

    <div #revealH1 class="header">
        <ng-container *ngFor="let word of letters; let i = index">
            <span [class.grey]="i >= revealedCount" [class.black]="i < revealedCount && !word.isBlue"
                [class.blue]="i < revealedCount && word.isBlue">
                {{ word.word }}
            </span>
        </ng-container>
    </div>

    <div class="content">Join the KCPL Talent Community to stay updated on exciting opportunities, upcoming roles
        happening near you. Let’s build the future of precision cooling—together.</div>
</div>
