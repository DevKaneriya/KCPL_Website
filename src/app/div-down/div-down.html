<div class="div-down">
  <div class="down-content">
    <div class="up">Since 1990</div>


    <div class="mobile-flex">
      <div #revealH1 class="header">
        <ng-container *ngFor="let word of letters; let i = index">
          <span [class.grey]="i >= revealedCount" [class.black]="i < revealedCount && !word.isBlue"
            [class.blue]="i < revealedCount && word.isBlue">
            {{ word.word }}
          </span>
        </ng-container>
      </div>

      <div class="mobile-image">
        <img #mobileTarget src="assets/images/Home/engine.png" />
      </div>
    </div>



    <div class="para">
     With decades of expertise in heat management, we provide precision-engineered radiators and condensers that optimize performance and ensure long-lasting reliability across industrial applications worldwide.
    </div>
    <div>
      <a href="/about">Learn About Us</a>
    </div>

  </div>

  <div class="down-image">
    <img #animateTarget src="assets/images/Home/engine.png" />
  </div>

</div>
